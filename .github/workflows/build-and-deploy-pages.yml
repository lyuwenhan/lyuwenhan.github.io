name: Build and deploy Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync_display]
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare
        run: |

          find -name "*.html" -type f -print0 | while IFS= read -r -d '' f; do
            perl -0777 -i -pe '
              my $nav = do {
                local $/;
                open my $fh, "<", "nav.html" or die "Cannot open nav.html";
                <$fh>;
              };
              s|(<div\s+id="nav"[^>]*>).*?(</div>)|$1\n$nav\n$2|sg;
            ' "$f"
          done

          rm -rf .github/ nav.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
